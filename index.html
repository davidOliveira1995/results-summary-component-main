<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <!-- CARD Started -->
    <div class="card">
      <header class="card-header">
        <h1 class="card-header--title">Your Result</h1>
        <div class="card-header--score">
          <p class="card-header--score-point">76</p>
          <p class="card-header--socore-second">of 100</p>
        </div>
        <h2 class="card-header--classification">Great</h2>
        <p class="card-header--paragraphy">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </header>
      <section class="card-summary">
        <h3 class="card-sumary--title">Summary</h3>
        <ul class="card-summary--box">
          <li class="card--reaction">
            <div>
              <img src="assets/images/icon-reaction.svg" class="card-summary--icon" alt="Icon" /> Reaction
            </div>
            <div>
              <span class="card-summary--score">80</span>
              <span class="card-summary--max-score">/ 100</span>
            </div>
          </li>
          <li class="card--memory">
            <div>
              <img src="assets/images/icon-memory.svg" class="card-summary--icon"alt="Icon" />Memory
            </div>
            <div>
              <span class="card-summary--score">92</span>
              <span class="card-summary--max-score">/ 100</span>
            </div>
          </li>
          <li class="card--verbal">
            <div>
              <img src="assets/images/icon-verbal.svg" class="card-summary--icon" alt="Icon" />Verbal
            </div>
            <div>
              <span class="card-summary--score">61</span>
              <span class="card-summary--max-score">/ 100</span>
            </div>
          </li>
          <li class="card--visual">
            <div>
              <img src="assets/images/icon-visual.svg" class="card-summary--icon" alt="Icon" />Visual
            </div>
            <div>
              <span class="card-summary--score">72</span>
              <span class="card-summary--max-score">/ 100</span>
            </div>
          </li>
        </ul>
        <button type="button" class="btn">Continue</button>
      </section>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/davidOliveira1995" target="_blank">David de Oliveira Silva</a>.
    </div>
  </body>
</html>
